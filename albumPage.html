<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brew & Bloom</title>
    <link rel="stylesheet" href="./styles/navbar.css" />
    <link rel="stylesheet" href="./styles/albumPage.css" />
  </head>
  <body>
    <nav class="navbar">
      <ul class="navbar-list">
        <li class="navbar-item">
          <a href="./index.html" class="navbar-link">Головна</a>
        </li>
        <li class="navbar-item">
          <a href="./about.html" class="navbar-link">Замовлення</a>
        </li>
        <li class="navbar-item">
          <a href="./history.html" class="navbar-link">Клієнти</a>
        </li>
        <li class="navbar-item">
          <a href="./employees.html" class="navbar-link">Працівники</a>
        </li>
        <li class="navbar-item">
          <a href="./albumPage.html" class="navbar-link">Постачальники</a>
        </li>
        <li class="navbar-item">
          <a href="./auth.html" class="navbar-link">Вийти</a>
        </li>
      </ul>
    </nav>

    <div class="form-container">
      <h1>Додавання постачальника</h1>
      <form id="supplier-form">
         <label for="supplier-name">Назва постачальника:</label>
         <input type="text" id="supplier-name" name="supplier_name" required />
         <label for="contact-name">Контактна особа:</label>
         <input type="text" id="contact-name" name="contact_name" required />
         <label for="phone-number">Номер телефону:</label>
         <input type="tel" id="phone-number" name="phone_number" required />
         <label for="email">Електронна пошта:</label>
         <input type="email" id="email" name="email" required />
         <label for="geolocation">Геолокація:</label>
         <input type="text" id="geolocation" name="geolocation" required />
         <button type="submit">Додати постачальника</button>
      </form>
      <div id="error-message" style="color: red"></div>
    </div>

  <div class="container">
  <h1>Список постачальників</h1>
  <table id="suppliers-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Назва постачальника</th>
        <th>Контактна особа</th>
        <th>Телефон</th>
        <th>Email</th>
        <th>Геолокація</th>
        <th>Дії</th>
      </tr>
    </thead>
    <tbody id="suppliers-table-body"></tbody>
  </table>
</div>
<script src="./scripts/albumPage.js"></script>
</body>
</html>
