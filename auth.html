<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brew & Bloom - Авторизація</title>
    <link rel = "stylesheet" href = "./styles/auth.css">
</head>
<body>
<div class="auth-section" id="authSection">
    <h2>Ласкаво просимо до Brew & Bloom</h2>
    <form id="authForm">
        <label for="firstName">Ім'я:</label>
        <input type="text" id="firstName" placeholder="Введіть ім'я" required>
        <label for="lastName">Прізвище:</label>
        <input type="text" id="lastName" placeholder="Введіть прізвище" required>
        <label for="phoneNumber">Номер телефону:</label>
        <input type="text" id="phoneNumber" placeholder="Введіть номер телефону" required>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Введіть email" required>
        <label for="position">Посада:</label>
        <input type="text" id="position" placeholder="Введіть посаду" required>
        <button type="submit" id="registerBtn">Зареєструватися</button>
        <button type="button" id="loginBtn">Увійти</button>
    </form>
    <p id="authMessage"></p>
</div>
<script src="./scripts/auth.js"></script>
</body>
</html>
